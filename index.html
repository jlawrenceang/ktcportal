<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/app-icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#f26a21" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="KTC Portal" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <title>KTC Online Portal</title>
    <meta name="description" content="Secure portal for accredited customs brokers and KTC Container Terminal Corp. staff — file and track Job Orders, container releases, gate and yard requests, and payments." />
    <!-- Open Graph / link-preview cards (shown when the URL is shared in email, Viber, chat). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="KTC Online Portal" />
    <meta property="og:title" content="KTC Online Portal — Container Terminal Services" />
    <meta property="og:description" content="Secure portal for accredited customs brokers and KTC Container Terminal staff — Job Orders, container releases, and payments." />
    <meta property="og:url" content="https://portal.ktcterminal.com/" />
    <meta property="og:image" content="https://portal.ktcterminal.com/app-icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="KTC Online Portal — Container Terminal Services" />
    <meta name="twitter:description" content="Secure portal for accredited customs brokers and KTC Container Terminal staff." />
    <!-- Set the theme before first paint to avoid a flash. External (not inline)
         so the CSP script-src 'self' directive doesn't block it. -->
    <script src="/theme-init.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
